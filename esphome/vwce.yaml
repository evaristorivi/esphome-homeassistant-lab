# ------------------------------------------------------------
# ESPHome: vwce.yaml
#
# Ejemplo completo de ESPHome para ESP32:
# - Obtiene el precio de VWCE directamente desde Internet (Yahoo Finance)
# - Muestra el valor en pantalla OLED
# - Expone el sensor a Home Assistant, que lo detecta automáticamente
#   como entidad, guarda el histórico y permite ver la gráfica del valor
# -------------------------------------------------------------
esphome:
  name: vwce-ticker
  comment: "ESP32-C3 con pantalla SSD1306 y VWCE"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# --- OTA para actualizar firmware por WiFi ---
ota:
  platform: esphome
  password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  # Opciones útiles si tienes problemas de conexión WiFi:
  # output_power: 8.5dB    # Reduce potencia si el ESP32 está muy cerca del router
  # fast_connect: false    # Si true, salta el escaneo de canales (más rápido pero menos fiable)
  # reboot_timeout: 15min  # Reiniciar si no conecta en X tiempo (default: 15min)

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true
  frequency: 100kHz   # 400kHz puede fallar en módulos baratos SSD1306

# --- Fuentes ---
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_price
    size: 32

http_request:
  useragent: "Mozilla/5.0"  # Yahoo Finance bloquea peticiones sin user-agent de navegador
  timeout: 10s
  # verify_ssl: true  # Default: true. Desactivar (false) si hay problemas de handshake SSL

# --- LED integrado GPIO8 (desactivado) ---
# El ESP32-C3 Super Mini tiene un LED azul simple en GPIO8 (no es RGB).
# El pin es invertido: LOW = encendido, HIGH = apagado.
# Descomentar para que aparezca un botón en Home Assistant con el que
# encender/apagar el LED manualmente — útil solo para pruebas.
# light:
#   - platform: status_led
#     name: "LED"
#     id: led_status
#     pin:
#       number: GPIO8
#       inverted: true
#     restore_mode: ALWAYS_OFF

# --- Sensores ---
sensor:
  - platform: template
    name: "VWCE Precio"
    id: vwce_price
    unit_of_measurement: "EUR"
    update_interval: never
  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 30s
    internal: true

# --- Pantalla SSD1306 ---
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: my_display
    update_interval: 10s
    lambda: |-
      float price = id(vwce_price).state;

      // Cabecera
      it.printf(0, 0, id(font_small), TextAlign::TOP_LEFT, "VWCE");
      it.printf(127, 0, id(font_small), TextAlign::TOP_RIGHT, "XETRA");

      // Barras de señal WiFi centradas en la cabecera
      // RSSI: >= -50 excelente, -60 bien, -70 regular, -80 débil
      int rssi = (int)id(wifi_rssi).state;
      int bars = 0;
      if (rssi >= -50) bars = 4;
      else if (rssi >= -60) bars = 3;
      else if (rssi >= -70) bars = 2;
      else if (rssi >= -80) bars = 1;
      int bw = 3, gap = 2;
      int sx = 64 - (4*bw + 3*gap) / 2;
      int bh[] = {3, 5, 8, 11};
      for (int i = 0; i < 4; i++) {
        int bx = sx + i*(bw+gap);
        int by = 12 - bh[i];
        if (i < bars)
          it.filled_rectangle(bx, by, bw, bh[i]);
        else
          it.rectangle(bx, by, bw, bh[i]);
      }

      // Precio grande centrado
      if (isnan(price)) {
        it.printf(64, 24, id(font_price), TextAlign::TOP_CENTER, "--- €");
      } else {
        it.printf(64, 24, id(font_price), TextAlign::TOP_CENTER, "%.2f €", price);
      }

# --- Intervalo para consultar Yahoo Finance ---
interval:
  - interval: 60s
    then:
      - if:
          condition:
            wifi.connected:
          else:
            - logger.log: "Sin WiFi, saltando petición HTTP"
          then:
            - http_request.get:
                url: "https://query1.finance.yahoo.com/v8/finance/chart/VWCE.DE?interval=1d&range=1d"
                capture_response: true
                request_headers:
                  User-Agent: "Mozilla/5.0"
                on_response:
                  then:
                    - lambda: |-
                        ESP_LOGI("vwce", "HTTP body: %d chars", (int)body.size());
                        std::string target = "\"regularMarketPrice\":";
                        size_t pos = body.find(target);
                        if (pos == std::string::npos) {
                          ESP_LOGW("vwce", "regularMarketPrice no encontrado en la respuesta");
                          ESP_LOGD("vwce", "Inicio body: %.200s", body.c_str());
                          return;
                        }
                        pos += target.length();
                        while (pos < body.size() && (body[pos] == ' ' || body[pos] == '\t')) pos++;
                        std::string num;
                        while (pos < body.size() && (isdigit((unsigned char)body[pos]) || body[pos] == '.' || body[pos] == '-')) {
                          num += body[pos++];
                        }
                        if (num.empty()) { ESP_LOGW("vwce", "Precio vacío tras búsqueda"); return; }
                        float price = atof(num.c_str());
                        ESP_LOGI("vwce", "VWCE precio: %.2f EUR", price);

                        // Publicar estado solo
                        id(vwce_price).publish_state(price);