# ============================================================================
# ESPHome: cyd_weather_offset_3dbox.yaml
#
# Igual que cyd_weather.yaml pero con offsets de compensación térmica
# para el CYD instalado dentro de una caja impresa en 3D.
#
# Offsets calibrados el 2026-04-21, ajuste frío el 2026-04-26 (CYD-box vs C3 referencia, misma ubicación):
#
# MODELO TÉRMICO DINÁMICO — la caja tiene dos regímenes según brillo backlight:
#   - Estado FRÍO (pantalla apagada):            T=-2.5°C, H=+4.5%
#   - Estado CALIENTE (pantalla 100% equilibrio): T=-3.8°C, H=+10.0%
# La variable global thermal_load (0..1) sigue el brillo con τ≈5min (inercia térmica
# de la caja). Los filtros lambda interpolan el offset según thermal_load.
#
# Offsets estáticos (no dependen del brillo):
#   - Presión:  CYD=1004.5hPa / C3=1004.4hPa → offset: +4.0hPa (estático)
#   - CO2:      sin offset — SCD40 recién reseteado, ASC necesita ~7 días para calibrar
#
# Paginas (navegacion MANUAL con botones < > — sin auto-rotacion):
#   1 - PANEL — meteo exterior (icono+temp+viento+PM) + sensores interiores
#       (CO2, T.INT, HUM, PRESION) en grid 3x2
#   2 - PREVISION — 4 filas: +3h, +6h, D+1, D+2
#   3 - VWCE — precio fondo indexado (sensor.vwce_precio_yahoo)
#
# Hardware CYD integrado:
#   - Display ST7789 240x320 SPI (HSPI) → landscape 320x240
#   - Tactil XPT2046 resistivo SPI (VSPI)
#   - Retroiluminacion PWM GPIO21
#   - LED RGB (GPIO4/R, GPIO16/G, GPIO17/B — activo-bajo)
#   - Sensores I2C en CN1 (SDA=GPIO22, SCL=GPIO27)
# ============================================================================

substitutions:
  location: !secret location_name
  location_display: !secret location_display

esphome:
  name: cyd-weather-box
  comment: "ESP32-2432S028R (CYD): Estación meteorológica Weather — caja 3D — LVGL"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

ota:
  platform: esphome
  password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

# ── Fuentes — FontAwesome 5 Free Solid ────────────────────────────────────────
font:
  - file: 'fonts/fa-solid-900.ttf'
    id: fa_14
    size: 14
    glyphs: "\uF1EB\uF053\uF054\uF0C9\uF185\uF0EB\uF04B\uF04C\uF011"
  - file: 'fonts/fa-solid-900.ttf'
    id: fa_28
    size: 28
    glyphs: "\uF185\uF186\uF0C2\uF75F\uF73B\uF0E7\uF6C4\uF73D\uF740\uF2DC\uF72E\uF071"
  - file: 'fonts/fa-solid-900.ttf'
    id: fa_48
    size: 48
    glyphs: "\uF185\uF186\uF0C2\uF75F\uF73B\uF0E7\uF6C4\uF73D\uF740\uF2DC\uF72E\uF071"

# ── Tiempo real (NTP) ─────────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    timezone: "Europe/Madrid"

# ── Bus I²C — conector CN1 del CYD ──────────────────────────────────────────
i2c:
  sda: GPIO22
  scl: GPIO27
  scan: true
  frequency: 100kHz

# ── Buses SPI ─────────────────────────────────────────────────────────────────
spi:
  - id: spi_display
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: spi_touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# ── Salidas PWM ───────────────────────────────────────────────────────────────
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO21
  - platform: ledc
    id: led_red
    pin:
      number: GPIO4
      inverted: true
  - platform: ledc
    id: led_green
    pin:
      number: GPIO16
      inverted: true
  - platform: ledc
    id: led_blue
    pin:
      number: GPIO17
      inverted: true

# ── Luces ─────────────────────────────────────────────────────────────────────
light:
  - platform: monochromatic
    id: backlight
    output: backlight_pwm
    name: "CYD Backlight"
    restore_mode: ALWAYS_ON

  - platform: rgb
    id: rgb_led
    name: "CYD LED RGB"
    red: led_red
    green: led_green
    blue: led_blue
    restore_mode: ALWAYS_OFF

# ── Globals ───────────────────────────────────────────────────────────────────
globals:
  - id: screen_dimmed
    type: bool
    initial_value: 'false'
  - id: brightness_level
    type: int
    initial_value: '0'   # 0=auto-dim, 1=100%, 2=50%, 3=25%
  - id: auto_rotate
    type: bool
    initial_value: 'true'
  - id: energy_save_disabled
    type: bool
    initial_value: 'false'
  # Estado térmico de la caja (0.0=fría, 1.0=caliente) — sigue al brillo
  # del backlight con constante de tiempo τ≈5min (inercia de la caja 3D).
  # Arranca en 0.5 (neutro) y converge al estado real en ~15min tras cada boot.
  - id: thermal_load
    type: float
    initial_value: '0.5'

# ── Sensores físicos I²C ──────────────────────────────────────────────────────
sensor:

  # BMP280 — presión atmosférica local (compensación CO₂)
  - platform: bmp280_i2c
    address: 0x77
    update_interval: 30s
    temperature:
      name: "BMP280 Temperatura"
      id: bmp280_temp
      internal: true
    pressure:
      name: "Presion Local"
      id: bmp280_press
      filters:
        - offset: 4.0   # calibrado 2026-04-21
      on_value:
        - lvgl.label.update:
            id: lbl_s_press
            text:
              format: "%.0f"
              args: ['x']

  # AHT20 — temperatura y humedad interiores (referencia)
  - platform: aht10
    variant: AHT20
    address: 0x38
    update_interval: 30s
    temperature:
      name: "Temperatura Interior"
      id: aht20_temp
      filters:
        # Offset dinámico: -2.5 (frío) → -3.8 (caliente, backlight 100% equilibrio)
        - lambda: 'return x + (-2.5f - 1.3f * id(thermal_load));'
      on_value:
        - lvgl.label.update:
            id: lbl_s_temp
            text:
              format: "%.1f\xB0C"
              args: ['x']
    humidity:
      name: "Humedad Interior"
      id: aht20_hum
      filters:
        # Offset dinámico: +4.5 (frío) → +10.0 (caliente, backlight 100% equilibrio)
        - lambda: 'return x + (4.5f + 5.5f * id(thermal_load));'
      on_value:
        - lvgl.label.update:
            id: lbl_s_hum
            text:
              format: "%.0f%%"
              args: ['x']

  # SCD40 — CO₂ interior
  - platform: scd4x
    id: scd4x_sensor
    address: 0x62
    update_interval: 30s
    ambient_pressure_compensation_source: bmp280_press
    co2:
      name: "CO2 Interior"
      id: co2_ppm
      on_value:
        - lvgl.label.update:
            id: lbl_s_co2
            text:
              format: "%.0f"
              args: ['x']
        - lambda: |-
            lv_color_t col;
            if (x > 1500) col = lv_color_hex(0xFF4444);
            else if (x > 1000) col = lv_color_hex(0xFF9100);
            else if (x > 700) col = lv_color_hex(0xFFD600);
            else col = lv_color_hex(0x69FF47);
            lv_obj_set_style_text_color(id(lbl_s_co2), col, 0);
            lv_obj_set_style_text_color(id(lbl_s_co2_unit), col, 0);
            lv_obj_update_layout(id(lbl_s_co2));
            lv_obj_align_to(id(lbl_s_co2_unit), id(lbl_s_co2), LV_ALIGN_OUT_RIGHT_BOTTOM, 8, 0);
    temperature:
      name: "SCD4x Temp"
      id: scd4x_temp
      internal: true
    humidity:
      name: "SCD4x Hum"
      id: scd4x_hum
      internal: true

  # WiFi RSSI
  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 30s
    internal: true

  # Temperatura interna del chip ESP32 del CYD
  # El display ST7789 calienta más que en el C3 — normal en caja: 50-70°C
  - platform: internal_temperature
    name: "CYD Temperatura Interna"
    id: esp32_temp
    update_interval: 30s
    on_value_range:
      - above: 75.0
        below: 85.0
        then:
          - logger.log:
              level: WARN
              format: "Temperatura CYD elevada: %.1f°C"
              args: ['x']
      - above: 85.0
        then:
          - logger.log:
              level: ERROR
              format: "Temperatura CYD critica: %.1f°C — reiniciando"
              args: ['x']
          - delay: 2s
          - button.press: restart_button

  # ── Sensores meteorologicos via Home Assistant ──────────────────────────
  - platform: homeassistant
    id: wx_temp
    entity_id: sensor.${location}_temperatura
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_wx_temp
          text:
            format: "%.1f"
            args: ['x']

  - platform: homeassistant
    id: wx_wind
    entity_id: sensor.${location}_viento
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_wx_wind
          text:
            format: "%.1f km/h"
            args: ['x * 3.6f']

  - platform: homeassistant
    id: wx_pm25
    entity_id: sensor.${location}_pm25
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_pm25_value
          text:
            format: "%.1f"
            args: ['x']

  - platform: homeassistant
    id: wx_pm10
    entity_id: sensor.${location}_pm10
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_pm10_value
          text:
            format: "%.1f"
            args: ['x']

  # ── Previsión +3h ──────────────────────────────────────────────────────
  - platform: homeassistant
    id: fc_3h_temp
    entity_id: sensor.${location}_forecast_3h_temp
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc0_temp
          text:
            format: "%.1f°"
            args: ['x']
  - platform: homeassistant
    id: fc_3h_hum
    entity_id: sensor.${location}_forecast_3h_hum
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc0_hum
          text:
            format: "%.1fmm"
            args: ['x']
  - platform: homeassistant
    id: fc_3h_wind
    entity_id: sensor.${location}_forecast_today_wind
    internal: true
    on_value:
      - lambda: |-
          char buf[16];
          if (isnan(x)) snprintf(buf, sizeof(buf), "--km/h");
          else snprintf(buf, sizeof(buf), "%.0fkm/h", x * 3.6f);
          lv_label_set_text(id(lbl_fc0_wind), buf);

  # ── Previsión +6h ──────────────────────────────────────────────────────
  - platform: homeassistant
    id: fc_6h_temp
    entity_id: sensor.${location}_forecast_6h_temp
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc1_temp
          text:
            format: "%.1f°"
            args: ['x']
  - platform: homeassistant
    id: fc_6h_hum
    entity_id: sensor.${location}_forecast_6h_hum
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc1_hum
          text:
            format: "%.1fmm"
            args: ['x']
  - platform: homeassistant
    id: fc_6h_wind
    entity_id: sensor.${location}_forecast_today_wind
    internal: true
    on_value:
      - lambda: |-
          char buf[16];
          if (isnan(x)) snprintf(buf, sizeof(buf), "--km/h");
          else snprintf(buf, sizeof(buf), "%.0fkm/h", x * 3.6f);
          lv_label_set_text(id(lbl_fc1_wind), buf);

  # ── Previsión día +1 (mañana) ──────────────────────────────────────────
  - platform: homeassistant
    id: fc_d1_temp_max
    entity_id: sensor.${location}_forecast_d1_temp_max
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc2_temp
          text:
            format: "%.1f°"
            args: ['x']
  - platform: homeassistant
    id: fc_d1_temp_min
    entity_id: sensor.${location}_forecast_d1_temp_min
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc2_tempmin
          text:
            format: "%.1f°"
            args: ['x']
  - platform: homeassistant
    id: fc_d1_hum
    entity_id: sensor.${location}_forecast_d1_hum
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc2_hum
          text:
            format: "%.1fmm"
            args: ['x']
  - platform: homeassistant
    id: fc_d1_wind
    entity_id: sensor.${location}_forecast_d1_wind
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc2_wind
          text:
            format: "%.0fkm/h"
            args: ['x * 3.6f']

  # ── Previsión día +2 (pasado mañana) ─────────────────────────────────
  - platform: homeassistant
    id: fc_d2_temp_max
    entity_id: sensor.${location}_forecast_d2_temp_max
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc3_temp
          text:
            format: "%.1f°"
            args: ['x']
  - platform: homeassistant
    id: fc_d2_temp_min
    entity_id: sensor.${location}_forecast_d2_temp_min
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc3_tempmin
          text:
            format: "%.1f°"
            args: ['x']
  - platform: homeassistant
    id: fc_d2_hum
    entity_id: sensor.${location}_forecast_d2_hum
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc3_hum
          text:
            format: "%.1fmm"
            args: ['x']
  - platform: homeassistant
    id: fc_d2_wind
    entity_id: sensor.${location}_forecast_d2_wind
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc3_wind
          text:
            format: "%.0fkm/h"
            args: ['x * 3.6f']

  # VWCE — precio desde Home Assistant
  - platform: homeassistant
    id: vwce_price
    entity_id: sensor.vwce_precio_yahoo
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_vwce_value
          text:
            format: "%.2f"
            args: ['x']

# ── Sensores de texto (condición meteorológica) desde HA ─────────────────────
text_sensor:
  - platform: homeassistant
    id: wx_condition
    entity_id: sensor.${location}_condicion
    internal: true
    on_value:
      - lambda: |-
          std::string cond = x;
          const char* icon = "\uF185";
          if (cond == "clear-night")          icon = "\uF186";
          else if (cond == "cloudy")           icon = "\uF0C2";
          else if (cond == "fog")              icon = "\uF75F";
          else if (cond == "hail")             icon = "\uF73B";
          else if (cond == "lightning")        icon = "\uF0E7";
          else if (cond == "lightning-rainy")  icon = "\uF0E7";
          else if (cond == "partlycloudy")     icon = "\uF6C4";
          else if (cond == "pouring")          icon = "\uF73D";
          else if (cond == "rainy")            icon = "\uF740";
          else if (cond == "snowy")            icon = "\uF2DC";
          else if (cond == "snowy-rainy")      icon = "\uF2DC";
          else if (cond == "sunny")            icon = "\uF185";
          else if (cond == "windy")            icon = "\uF72E";
          else if (cond == "windy-variant")    icon = "\uF72E";
          else if (cond == "exceptional")      icon = "\uF071";
          lv_label_set_text(id(lbl_wx_icon_big), icon);
      - lambda: |-
          std::string cond = x;
          lv_color_t col;
          if (cond == "sunny" || cond == "clear-night")
            col = lv_color_hex(0xFFD600);
          else if (cond == "partlycloudy")
            col = lv_color_hex(0xFFAA00);
          else if (cond == "cloudy" || cond == "fog")
            col = lv_color_hex(0x90A4AE);
          else if (cond == "rainy" || cond == "pouring")
            col = lv_color_hex(0x42A5F5);
          else if (cond == "snowy" || cond == "snowy-rainy")
            col = lv_color_hex(0xB3E5FC);
          else if (cond == "lightning" || cond == "lightning-rainy")
            col = lv_color_hex(0xFFFF00);
          else
            col = lv_color_hex(0xFFD600);
          lv_obj_set_style_text_color(id(lbl_wx_icon_big), col, 0);

  - platform: homeassistant
    id: wx_condition_text
    entity_id: sensor.${location}_condicion_texto
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_wx_cond_text
          text: !lambda 'return x.c_str();'

  - platform: homeassistant
    id: fc_0_cond
    entity_id: sensor.${location}_forecast_3h_cond
    internal: true
    on_value:
      - lambda: |-
          const char* icon = "\uF185";
          std::string c = x;
          if (c=="cloudy" || c=="fog")          icon = "\uF0C2";
          else if (c=="partlycloudy")            icon = "\uF6C4";
          else if (c=="rainy"||c=="pouring")     icon = "\uF740";
          else if (c=="snowy"||c=="snowy-rainy") icon = "\uF2DC";
          else if (c=="lightning"||c=="lightning-rainy") icon = "\uF0E7";
          else if (c=="clear-night")             icon = "\uF186";
          lv_label_set_text(id(lbl_fc0_icon), icon);

  - platform: homeassistant
    id: fc_1_cond
    entity_id: sensor.${location}_forecast_6h_cond
    internal: true
    on_value:
      - lambda: |-
          const char* icon = "\uF185";
          std::string c = x;
          if (c=="cloudy" || c=="fog")          icon = "\uF0C2";
          else if (c=="partlycloudy")            icon = "\uF6C4";
          else if (c=="rainy"||c=="pouring")     icon = "\uF740";
          else if (c=="snowy"||c=="snowy-rainy") icon = "\uF2DC";
          else if (c=="lightning"||c=="lightning-rainy") icon = "\uF0E7";
          else if (c=="clear-night")             icon = "\uF186";
          lv_label_set_text(id(lbl_fc1_icon), icon);

  - platform: homeassistant
    id: fc_2_cond
    entity_id: sensor.${location}_forecast_d1_cond
    internal: true
    on_value:
      - lambda: |-
          const char* icon = "\uF185";
          std::string c = x;
          if (c=="cloudy" || c=="fog")          icon = "\uF0C2";
          else if (c=="partlycloudy")            icon = "\uF6C4";
          else if (c=="rainy"||c=="pouring")     icon = "\uF740";
          else if (c=="snowy"||c=="snowy-rainy") icon = "\uF2DC";
          else if (c=="lightning"||c=="lightning-rainy") icon = "\uF0E7";
          else if (c=="clear-night")             icon = "\uF186";
          lv_label_set_text(id(lbl_fc2_icon), icon);

  - platform: homeassistant
    id: fc_3_cond
    entity_id: sensor.${location}_forecast_d2_cond
    internal: true
    on_value:
      - lambda: |-
          const char* icon = "\uF185";
          std::string c = x;
          if (c=="cloudy" || c=="fog")          icon = "\uF0C2";
          else if (c=="partlycloudy")            icon = "\uF6C4";
          else if (c=="rainy"||c=="pouring")     icon = "\uF740";
          else if (c=="snowy"||c=="snowy-rainy") icon = "\uF2DC";
          else if (c=="lightning"||c=="lightning-rainy") icon = "\uF0E7";
          else if (c=="clear-night")             icon = "\uF186";
          lv_label_set_text(id(lbl_fc3_icon), icon);

  - platform: homeassistant
    id: fc_d1_label
    entity_id: sensor.${location}_forecast_d1_diaSemana
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc2_day
          text: !lambda 'return x.c_str();'

  - platform: homeassistant
    id: fc_d2_label
    entity_id: sensor.${location}_forecast_d2_diaSemana
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_fc3_day
          text: !lambda 'return x.c_str();'

# ── Botón de reinicio ─────────────────────────────────────────────────────────
button:
  - platform: restart
    id: restart_button
    name: "Restart"
    internal: true

# ── Actualización periódica de hora y WiFi ────────────────────────────────────
interval:
  # Modelo térmico: thermal_load sigue al brillo del backlight con τ≈5min.
  # alpha = dt/(tau+dt) = 30/(300+30) ≈ 0.091
  - interval: 30s
    then:
      - lambda: |-
          float target = 0.0f;
          if (id(backlight).remote_values.is_on()) {
            target = id(backlight).remote_values.get_brightness();
          }
          const float alpha = 0.091f;
          id(thermal_load) += alpha * (target - id(thermal_load));

  - interval: 1s
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (!t.is_valid()) return;
          char buf[6];
          snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
          lv_label_set_text(id(lbl_hora), buf);

  - interval: 10s
    then:
      - if:
          condition:
            lambda: 'return id(auto_rotate);'
          then:
            - lvgl.page.next:
                animation: MOVE_LEFT
                time: 250ms

  - interval: 5s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lvgl.widget.update:
                id: lbl_wifi_top
                text_color: 0x4ADE80
          else:
            - lvgl.widget.update:
                id: lbl_wifi_top
                text_color: 0xFF4444

# ── Pantalla ST7789 ──────────────────────────────────────────────────────────
display:
  - platform: ili9xxx
    model: st7789v
    id: cyd_display
    spi_id: spi_display
    cs_pin: GPIO15
    dc_pin: GPIO2
    color_order: bgr
    invert_colors: false
    data_rate: 40MHz
    dimensions:
      width: 320
      height: 240
    transform:
      swap_xy: true
      mirror_x: true
    auto_clear_enabled: false
    update_interval: never

# ── Pantalla táctil XPT2046 ──────────────────────────────────────────────────
touchscreen:
  - platform: xpt2046
    id: cyd_touch
    spi_id: spi_touch
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 10ms
    threshold: 250
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 180
      y_max: 3860
    transform:
      swap_xy: true
      mirror_x: false
    on_touch:
      - lambda: |-
          if (id(screen_dimmed)) {
            id(screen_dimmed) = false;
            auto call = id(backlight).turn_on();
            call.set_brightness(1.0f);
            call.set_transition_length(300);
            call.perform();
          }

# ══════════════════════════════════════════════════════════════════════════════
#                        LVGL — Interfaz gráfica
# ══════════════════════════════════════════════════════════════════════════════
lvgl:
  displays:
    - cyd_display
  touchscreens:
    - cyd_touch
  buffer_size: 25%
  color_depth: 16
  default_font: montserrat_14
  page_wrap: true

  on_idle:
    timeout: 60s
    then:
      - if:
          condition:
            lambda: 'return !id(energy_save_disabled);'
          then:
            - lambda: 'id(screen_dimmed) = true;'
            - light.turn_on:
                id: backlight
                brightness: 15%
                transition_length: 3s

  style_definitions:
    - id: style_card
      bg_color: 0x161B22
      bg_opa: cover
      radius: 16
      border_width: 1
      border_color: 0x30363D
      border_opa: 60%
      shadow_color: 0x000000
      shadow_width: 15
      shadow_opa: 25%
      shadow_ofs_y: 4

    - id: style_fc_row
      bg_color: 0x0D2040
      bg_opa: cover
      radius: 8
      border_width: 1
      border_color: 0x1A4A6A
      border_opa: cover
      pad_all: 0

  # ── Capa superior — flotante sin barra fija ─────────────────────────────
