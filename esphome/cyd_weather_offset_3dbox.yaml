          bg_opa: transp
          border_width: 0
          shadow_width: 0
          on_click:
            - lambda: |-
                id(brightness_level) = (id(brightness_level) + 1) % 3;
                float levels[] = {1.0f, 0.5f, 0.25f};
                auto call = id(backlight).turn_on();
                call.set_brightness(levels[id(brightness_level)]);
                call.set_transition_length(200);
                call.perform();
                id(screen_dimmed) = false;
          widgets:
