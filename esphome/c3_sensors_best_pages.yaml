# ------------------------------------------------------------
# ESPHome: sensors_best_pages.yaml
#
# Basado en sensors_best.yaml — mismos sensores óptimos,
# pantalla OLED con 4 páginas a pantalla completa que rotan
# automáticamente cada 6 segundos.
#
# Páginas:
#   1 · CO₂          ppm    SCD40
#   2 · Temperatura  °C     AHT20
#   3 · Humedad      %      AHT20
#   4 · Presión      hPa    BMP280
#
# Layout de cada página (128×64 px):
#   y= 0-12  barra invertida: etiqueta (izq) + barras WiFi (dcha)
#   y=13-53  valor a pantalla completa (font_huge 40px, centrado)
#   y=55-63  unidad y/o calidad (font_tiny 9px)
# ------------------------------------------------------------

esphome:
  name: sensors-best-pages
  comment: "ESP32-C3: OLED 4 páginas rotativas — CO2, T, H, P"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

ota:
  platform: esphome
  password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true
  frequency: 100kHz

# ── Fuentes ───────────────────────────────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 9       # unidad, calidad CO₂, texto de pie
  - file: "gfonts://Roboto"
    id: font_label
    size: 11      # etiqueta en cabecera invertida
  - file: "gfonts://Roboto"
    id: font_huge
    size: 40      # valor principal — máximo que encaja en el área central

# ── Sensores ──────────────────────────────────────────────────────────────────
sensor:

  # BMP280 — solo presión (temperatura internal, AHT20 es más preciso)
  - platform: bmp280_i2c
    address: 0x77
    update_interval: 30s
    temperature:
      name: "BMP280 Temperatura"
      id: bmp280_temp
      internal: true
    pressure:
      name: "Presion"
      id: bmp280_press

  # SCD40/SCD41 — solo CO₂ se expone (T y H tienen self-heating)
  - platform: scd4x
    address: 0x62
    update_interval: 30s
    ambient_pressure_compensation_source: bmp280_press
    co2:
      name: "CO2"
      id: co2_ppm
    temperature:
      name: "SCD4x Temperatura"
      id: scd4x_temp
      internal: true
    humidity:
      name: "SCD4x Humedad"
      id: scd4x_hum
      internal: true

  # AHT20 — temperatura (±0.3°C) y humedad (±2% RH)
  - platform: aht10
    variant: AHT20
    address: 0x38
    update_interval: 30s
    temperature:
      name: "Temperatura"
      id: aht20_temp
    humidity:
      name: "Humedad"
      id: aht20_hum

  # WiFi RSSI — solo interno, para las barras en pantalla
  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 30s
    internal: true

# ── Rotación automática de páginas cada 6 segundos ────────────────────────────
interval:
  - interval: 6s
    then:
      - display.page.show_next: my_display
      - component.update: my_display

# ── Pantalla SSD1306 128×64 ───────────────────────────────────────────────────
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: my_display
    update_interval: 1s
    pages:

      # ── Página 1: CO₂ ────────────────────────────────────────────────────
      - id: page_co2
        lambda: |-
          // Cabecera invertida (píxeles blancos = barra blanca)
          it.filled_rectangle(0, 0, 128, 13);
          it.printf(3, 1, id(font_label), COLOR_OFF, TextAlign::TOP_LEFT, "CO2");

          // Barras WiFi en cabecera (trazo negro sobre fondo blanco)
          int rssi = (int)id(wifi_rssi).state;
          int wbars = 0;
          if      (rssi >= -50) wbars = 4;
          else if (rssi >= -60) wbars = 3;
          else if (rssi >= -70) wbars = 2;
          else if (rssi >= -80) wbars = 1;
          int bw = 3, bgap = 2;
          int wbh[] = {3, 5, 7, 9};
          for (int i = 0; i < 4; i++) {
            int bx = 110 + i * (bw + bgap);
            int by = 12 - wbh[i];
            if (i < wbars) it.filled_rectangle(bx, by, bw, wbh[i], COLOR_OFF);
            else           it.rectangle(bx, by, bw, wbh[i], COLOR_OFF);
          }

          // Valor CO₂ — número enorme centrado
          float co2 = id(co2_ppm).state;
          if (isnan(co2)) it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "---");
          else            it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "%.0f", co2);

          // Calidad del aire (izq) · unidad ppm (dcha)
          const char* q;
          if      (isnan(co2)) q = "---";
          else if (co2 > 1500) q = "PELIGROSO";
          else if (co2 > 1000) q = "MALO";
          else if (co2 >  700) q = "ACEPTABLE";
          else                 q = "BUENO";
          it.printf(  0, 55, id(font_tiny), TextAlign::TOP_LEFT,  "%s", q);
          it.printf(127, 55, id(font_tiny), TextAlign::TOP_RIGHT, "ppm");

      # ── Página 2: Temperatura ────────────────────────────────────────────
      - id: page_temp
        lambda: |-
          it.filled_rectangle(0, 0, 128, 13);
          it.printf(3, 1, id(font_label), COLOR_OFF, TextAlign::TOP_LEFT, "TEMPERATURA");

          int rssi = (int)id(wifi_rssi).state;
          int wbars = 0;
          if      (rssi >= -50) wbars = 4;
          else if (rssi >= -60) wbars = 3;
          else if (rssi >= -70) wbars = 2;
          else if (rssi >= -80) wbars = 1;
          int bw = 3, bgap = 2;
          int wbh[] = {3, 5, 7, 9};
          for (int i = 0; i < 4; i++) {
            int bx = 110 + i * (bw + bgap);
            int by = 12 - wbh[i];
            if (i < wbars) it.filled_rectangle(bx, by, bw, wbh[i], COLOR_OFF);
            else           it.rectangle(bx, by, bw, wbh[i], COLOR_OFF);
          }

          float t = id(aht20_temp).state;
          if (isnan(t)) it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "---");
          else          it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "%.1f", t);

          it.printf(64, 55, id(font_tiny), TextAlign::TOP_CENTER, "\xc2\xb0""C");

      # ── Página 3: Humedad ────────────────────────────────────────────────
      - id: page_hum
        lambda: |-
          it.filled_rectangle(0, 0, 128, 13);
          it.printf(3, 1, id(font_label), COLOR_OFF, TextAlign::TOP_LEFT, "HUMEDAD");

          int rssi = (int)id(wifi_rssi).state;
          int wbars = 0;
          if      (rssi >= -50) wbars = 4;
          else if (rssi >= -60) wbars = 3;
          else if (rssi >= -70) wbars = 2;
          else if (rssi >= -80) wbars = 1;
          int bw = 3, bgap = 2;
          int wbh[] = {3, 5, 7, 9};
          for (int i = 0; i < 4; i++) {
            int bx = 110 + i * (bw + bgap);
            int by = 12 - wbh[i];
            if (i < wbars) it.filled_rectangle(bx, by, bw, wbh[i], COLOR_OFF);
            else           it.rectangle(bx, by, bw, wbh[i], COLOR_OFF);
          }

          float h = id(aht20_hum).state;
          if (isnan(h)) it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "---");
          else          it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "%.0f", h);

          it.printf(64, 55, id(font_tiny), TextAlign::TOP_CENTER, "%%");

      # ── Página 4: Presión ────────────────────────────────────────────────
      - id: page_press
        lambda: |-
          it.filled_rectangle(0, 0, 128, 13);
          it.printf(3, 1, id(font_label), COLOR_OFF, TextAlign::TOP_LEFT, "PRESION");

          int rssi = (int)id(wifi_rssi).state;
          int wbars = 0;
          if      (rssi >= -50) wbars = 4;
          else if (rssi >= -60) wbars = 3;
          else if (rssi >= -70) wbars = 2;
          else if (rssi >= -80) wbars = 1;
          int bw = 3, bgap = 2;
          int wbh[] = {3, 5, 7, 9};
          for (int i = 0; i < 4; i++) {
            int bx = 110 + i * (bw + bgap);
            int by = 12 - wbh[i];
            if (i < wbars) it.filled_rectangle(bx, by, bw, wbh[i], COLOR_OFF);
            else           it.rectangle(bx, by, bw, wbh[i], COLOR_OFF);
          }

          float p = id(bmp280_press).state;
          if (isnan(p)) it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "---");
          else          it.printf(64, 13, id(font_huge), TextAlign::TOP_CENTER, "%.0f", p);

          it.printf(64, 55, id(font_tiny), TextAlign::TOP_CENTER, "hPa");
