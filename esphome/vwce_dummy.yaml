# ------------------------------------------------------------
# ESPHome: vwce_dummy.yaml
# -------------------------------------------------------------
# Ejemplo de ESPHome para ESP32 usando integración con Home Assistant:
# - El ESP32 recibe el precio de VWCE desde un sensor REST de Home Assistant
# - Ideal para cuando Home Assistant ya obtiene el dato y quieres compartirlo
#   con varios dispositivos
# -------------------------------------------------------------

esphome:
  name: vwce-ticker
  comment: "ESP32-C3 con pantalla SSD1306 mostrando precio VWCE desde Home Assistant"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    
# OTA para actualizar firmware por WiFi
ota:
  platform: esphome
  password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5dB
  fast_connect: false
  power_save_mode: none
  reboot_timeout: 15min

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true
  frequency: 100kHz

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_price
    size: 32

# Sensor que recibe el último precio desde Home Assistant
sensor:
  - platform: homeassistant
    id: vwce_price
    entity_id: sensor.vwce_precio_yahoo
    internal: true   # No aparece en la UI de ESPHome

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: my_display
    update_interval: 10s
    lambda: |-
      float price = id(vwce_price).state;

      // Cabecera
      it.printf(0, 0, id(font_small), TextAlign::TOP_LEFT, "VWCE");
      it.printf(127, 0, id(font_small), TextAlign::TOP_RIGHT, "XETRA");

      // Precio grande centrado
      if (isnan(price)) {
        it.printf(64, 24, id(font_price), TextAlign::TOP_CENTER, "--- €");
      } else {
        it.printf(64, 24, id(font_price), TextAlign::TOP_CENTER, "%.2f €", price);
      }