# ------------------------------------------------------------
# ESPHome: vwce_dummy.yaml
# -------------------------------------------------------------
# Ejemplo de ESPHome para ESP32 usando integración con Home Assistant:
# - El ESP32 recibe el precio de VWCE desde un sensor REST de Home Assistant
# - Ideal para cuando Home Assistant ya obtiene el dato y quieres compartirlo
#   con varios dispositivos
# -------------------------------------------------------------

esphome:
  name: vwce-ticker
  comment: "ESP32-C3 con pantalla SSD1306 mostrando precio VWCE desde Home Assistant"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    
# OTA para actualizar firmware por WiFi
ota:
  platform: esphome
  password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  # Opciones útiles si tienes problemas de conexión WiFi:
  # output_power: 8.5dB    # Reduce potencia si el ESP32 está muy cerca del router
  # fast_connect: false    # Si true, salta el escaneo de canales (más rápido pero menos fiable)
  # reboot_timeout: 15min  # Reiniciar si no conecta en X tiempo (default: 15min)

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true
  frequency: 100kHz

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_price
    size: 32

# Sensores
sensor:
  - platform: homeassistant
    id: vwce_price
    entity_id: sensor.vwce_precio_yahoo
    internal: true
  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 30s
    internal: true

# --- LED integrado GPIO8 (desactivado) ---
# El ESP32-C3 Super Mini tiene un LED azul simple en GPIO8 (no es RGB).
# El pin es invertido: LOW = encendido, HIGH = apagado.
# Descomentar para que aparezca un botón en Home Assistant con el que
# encender/apagar el LED manualmente — útil solo para pruebas.
# light:
#   - platform: status_led
#     name: "LED"
#     id: led_status
#     pin:
#       number: GPIO8
#       inverted: true
#     restore_mode: ALWAYS_OFF

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: my_display
    update_interval: 10s
    lambda: |-
      float price = id(vwce_price).state;

      // Cabecera
      it.printf(0, 0, id(font_small), TextAlign::TOP_LEFT, "VWCE");
      it.printf(127, 0, id(font_small), TextAlign::TOP_RIGHT, "XETRA");

      // Barras de señal WiFi centradas en la cabecera
      // RSSI: >= -50 excelente, -60 bien, -70 regular, -80 débil
      int rssi = (int)id(wifi_rssi).state;
      int bars = 0;
      if (rssi >= -50) bars = 4;
      else if (rssi >= -60) bars = 3;
      else if (rssi >= -70) bars = 2;
      else if (rssi >= -80) bars = 1;
      int bw = 3, gap = 2;
      int sx = 64 - (4*bw + 3*gap) / 2;
      int bh[] = {3, 5, 8, 11};
      for (int i = 0; i < 4; i++) {
        int bx = sx + i*(bw+gap);
        int by = 12 - bh[i];
        if (i < bars)
          it.filled_rectangle(bx, by, bw, bh[i]);
        else
          it.rectangle(bx, by, bw, bh[i]);
      }

      // Precio grande centrado
      if (isnan(price)) {
        it.printf(64, 24, id(font_price), TextAlign::TOP_CENTER, "--- €");
      } else {
        it.printf(64, 24, id(font_price), TextAlign::TOP_CENTER, "%.2f €", price);
      }